name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        if: secrets.KUBERNETES_CONFIG != ''
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        if: secrets.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: secrets.AWS_ACCESS_KEY_ID != ''
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        if: secrets.AWS_ACCESS_KEY_ID != ''
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/platform-api:${{ github.sha }} .
          docker push $ECR_REGISTRY/platform-api:${{ github.sha }}

      - name: Build without push
        if: secrets.AWS_ACCESS_KEY_ID == ''
        run: docker build -t platform-api .

      - name: Deploy to Kubernetes
        if: secrets.KUBERNETES_CONFIG != ''
        env:
          KUBECONFIG: ${{ secrets.KUBERNETES_CONFIG }}
        run: |
          kubectl set image deployment/platform-api platform-api=$ECR_REGISTRY/platform-api:${{ github.sha }}
          kubectl rollout status deployment/platform-api

      - name: Deploy without Kubernetes
        if: secrets.KUBERNETES_CONFIG == ''
        run: |
          echo "Skipping Kubernetes deployment - no configuration provided"
          echo "To enable Kubernetes deployment, add KUBERNETES_CONFIG secret"

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.issue
            github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: '❌ CD pipeline failed. Please check the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
            }) 