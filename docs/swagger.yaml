basePath: /api/v1
definitions:
  main.APIError:
    properties:
      code:
        type: string
      message:
        type: string
      status:
        type: integer
    type: object
  models.Bot:
    properties:
      config:
        $ref: '#/definitions/models.BotConfig'
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      tenant_id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
    type: object
  models.BotConfig:
    properties:
      model_config:
        description: Specific configuration for the AI model
        items:
          type: integer
        type: array
      model_type:
        description: e.g., "gpt-4", "claude", "custom"
        type: string
      response_type:
        description: '"sse" or "websocket"'
        type: string
      settings:
        $ref: '#/definitions/models.BotSettings'
    type: object
  models.BotSettings:
    properties:
      allowed_users:
        description: User IDs that can interact with this bot
        items:
          type: integer
        type: array
      custom_prompts:
        description: Custom system prompts
        items:
          type: string
        type: array
      max_tokens:
        type: integer
      restricted_topics:
        description: Topics the bot should avoid
        items:
          type: string
        type: array
      stop_sequences:
        items:
          type: string
        type: array
      temperature:
        type: number
    type: object
  models.Channel:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      settings:
        $ref: '#/definitions/models.ChannelSettings'
      tenant_id:
        type: integer
      type:
        $ref: '#/definitions/models.ChannelType'
      updated_at:
        type: string
    type: object
  models.ChannelSettings:
    properties:
      allow_bots:
        type: boolean
      allow_files:
        type: boolean
      allowed_file_types:
        items:
          type: string
        type: array
      max_file_size:
        type: integer
      notifications:
        type: boolean
      retention_days:
        type: integer
    type: object
  models.ChannelType:
    enum:
    - public
    - private
    - direct
    type: string
    x-enum-varnames:
    - ChannelTypePublic
    - ChannelTypePrivate
    - ChannelTypeDirect
  models.File:
    properties:
      content_type:
        type: string
      created_at:
        type: string
      filename:
        type: string
      filepath:
        type: string
      id:
        type: integer
      metadata:
        additionalProperties: true
        type: object
      mime_type:
        description: File MIME type
        type: string
      name:
        description: Original file name
        type: string
      path:
        description: Storage path
        type: string
      size:
        type: integer
      tenant_id:
        type: integer
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: integer
    type: object
  models.ForumCategory:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      order:
        type: integer
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  models.ForumPost:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_edited:
        type: boolean
      topic_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.ForumTopic:
    properties:
      category_id:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_locked:
        type: boolean
      is_pinned:
        type: boolean
      last_post_at:
        type: string
      tenant_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      views:
        type: integer
    type: object
  models.Location:
    properties:
      accuracy:
        description: Accuracy in meters
        type: number
      altitude:
        description: Altitude in meters
        type: number
      created_at:
        type: string
      heading:
        description: Heading in degrees
        type: number
      id:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      metadata:
        additionalProperties: true
        type: object
      speed:
        description: Speed in meters per second
        type: number
      tenant_id:
        type: string
      timestamp:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.LocationHistory:
    properties:
      created_at:
        type: string
      end_time:
        type: string
      id:
        type: string
      locations:
        items:
          $ref: '#/definitions/models.Location'
        type: array
      start_time:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.LocationStats:
    properties:
      average_speed:
        type: number
      last_location:
        $ref: '#/definitions/models.Location'
      last_update:
        type: string
      max_speed:
        type: number
      total_distance:
        description: Total distance traveled in meters
        type: number
      total_history:
        type: integer
      total_locations:
        type: integer
    type: object
  models.Message:
    properties:
      content:
        type: string
      group_id:
        type: integer
      group_name:
        type: string
      receiver:
        type: string
      receiver_id:
        type: integer
      sender:
        type: string
      sender_id:
        type: integer
      tenant_id:
        type: integer
      timestamp:
        type: string
      topic_name:
        type: string
      type:
        description: '"private", "group", "notification"'
        type: string
    type: object
  models.ReportSchedule:
    properties:
      created_at:
        type: string
      day_of_month:
        description: 1-31 for monthly reports
        type: integer
      day_of_week:
        description: 0-6 for weekly reports
        type: integer
      format:
        description: json, csv, pdf
        type: string
      frequency:
        description: daily, weekly, monthly
        type: string
      id:
        type: string
      last_run:
        type: string
      name:
        type: string
      next_run:
        type: string
      options:
        type: string
      recipients:
        items:
          type: string
        type: array
      tenant_id:
        type: string
      time_of_day:
        description: HH:MM format
        type: string
      type:
        description: user_activity, location, system_health
        type: string
      updated_at:
        type: string
    type: object
  models.Ticket:
    properties:
      assigned_to:
        type: string
      category:
        $ref: '#/definitions/models.TicketCategory'
      closed_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      notify_on_assign:
        type: boolean
      notify_on_comment:
        type: boolean
      notify_on_status:
        type: boolean
      notify_on_update:
        type: boolean
      priority:
        $ref: '#/definitions/models.TicketPriority'
      resolved_at:
        type: string
      status:
        $ref: '#/definitions/models.TicketStatus'
      tenant_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.TicketAttachment:
    properties:
      comment_id:
        type: string
      created_at:
        type: string
      file_name:
        type: string
      file_size:
        type: integer
      file_type:
        type: string
      file_url:
        type: string
      id:
        type: string
      ticket_id:
        type: string
      updated_at:
        type: string
    type: object
  models.TicketCategory:
    enum:
    - bug
    - feature
    - support
    - security
    - other
    type: string
    x-enum-varnames:
    - TicketCategoryBug
    - TicketCategoryFeature
    - TicketCategorySupport
    - TicketCategorySecurity
    - TicketCategoryOther
  models.TicketComment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      ticket_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.TicketPriority:
    enum:
    - low
    - medium
    - high
    - urgent
    type: string
    x-enum-varnames:
    - TicketPriorityLow
    - TicketPriorityMedium
    - TicketPriorityHigh
    - TicketPriorityUrgent
  models.TicketStatus:
    enum:
    - open
    - pending
    - resolved
    - closed
    type: string
    x-enum-varnames:
    - TicketStatusOpen
    - TicketStatusPending
    - TicketStatusResolved
    - TicketStatusClosed
  models.TrackingError:
    properties:
      created_at:
        type: string
      id:
        type: string
      message:
        type: string
      metadata:
        additionalProperties: true
        type: object
      stack:
        type: string
      tenant_id:
        type: string
      timestamp:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.TrackingEvent:
    properties:
      created_at:
        type: string
      event_type:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      tenant_id:
        type: string
      timestamp:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.TrackingMetric:
    properties:
      created_at:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      tenant_id:
        type: string
      timestamp:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      value:
        type: number
    type: object
  models.TrackingStats:
    properties:
      error_messages:
        items:
          type: string
        type: array
      event_types:
        items:
          type: string
        type: array
      last_error_time:
        type: string
      last_event_time:
        type: string
      last_metric_time:
        type: string
      metric_names:
        items:
          type: string
        type: array
      total_errors:
        type: integer
      total_events:
        type: integer
      total_metrics:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      last_login:
        type: string
      last_name:
        type: string
      metadata:
        additionalProperties: true
        type: object
      role_id:
        type: integer
      tenant_id:
        type: integer
      timezone:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  services.ReportOptions:
    properties:
      endTime:
        type: string
      format:
        description: '"json", "csv", "pdf"'
        type: string
      startTime:
        type: string
      tenantID:
        type: string
      userID:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A chat system API with real-time messaging, file sharing, and support
    ticket management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Chat System API
  version: "1.0"
paths:
  /api/v1/bots:
    get:
      consumes:
      - application/json
      description: Get a list of all bots with optional filtering
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Number of items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of bots
          schema:
            items:
              $ref: '#/definitions/models.Bot'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: List all bots
      tags:
      - Bots
    post:
      consumes:
      - application/json
      description: Create a new chat bot
      parameters:
      - description: Bot details
        in: body
        name: bot
        required: true
        schema:
          $ref: '#/definitions/models.Bot'
      produces:
      - application/json
      responses:
        "201":
          description: Bot created successfully
          schema:
            $ref: '#/definitions/models.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new bot
      tags:
      - Bots
  /api/v1/bots/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an existing bot
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Bot deleted successfully
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Bot not found
          schema:
            additionalProperties: true
            type: object
      summary: Delete a bot
      tags:
      - Bots
    get:
      consumes:
      - application/json
      description: Get details of a specific bot
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Bot details
          schema:
            $ref: '#/definitions/models.Bot'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Bot not found
          schema:
            additionalProperties: true
            type: object
      summary: Get bot details
      tags:
      - Bots
    put:
      consumes:
      - application/json
      description: Update an existing bot's configuration
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated bot details
        in: body
        name: bot
        required: true
        schema:
          $ref: '#/definitions/models.Bot'
      produces:
      - application/json
      responses:
        "200":
          description: Bot updated successfully
          schema:
            $ref: '#/definitions/models.Bot'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Bot not found
          schema:
            additionalProperties: true
            type: object
      summary: Update bot details
      tags:
      - Bots
  /api/v1/channels:
    post:
      consumes:
      - application/json
      description: Create a new chat channel
      parameters:
      - description: Channel details
        in: body
        name: channel
        required: true
        schema:
          $ref: '#/definitions/models.Channel'
      produces:
      - application/json
      responses:
        "201":
          description: Channel created successfully
          schema:
            $ref: '#/definitions/models.Channel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new channel
      tags:
      - Chat
  /api/v1/channels/{channel_id}/bots/{bot_id}:
    delete:
      consumes:
      - application/json
      description: Remove a bot from a chat channel
      parameters:
      - description: Channel ID
        in: path
        name: channel_id
        required: true
        type: string
      - description: Bot ID
        in: path
        name: bot_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Bot removed from channel successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Channel or bot not found
          schema:
            additionalProperties: true
            type: object
      summary: Remove bot from channel
      tags:
      - Bots
    post:
      consumes:
      - application/json
      description: Add a bot to a chat channel
      parameters:
      - description: Channel ID
        in: path
        name: channel_id
        required: true
        type: string
      - description: Bot ID
        in: path
        name: bot_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Bot added to channel successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Channel or bot not found
          schema:
            additionalProperties: true
            type: object
      summary: Add bot to channel
      tags:
      - Bots
  /api/v1/channels/{channel_id}/messages:
    get:
      consumes:
      - application/json
      description: Get messages from a specific channel with pagination
      parameters:
      - description: Channel ID
        in: path
        name: channel_id
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Number of messages per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of messages
          schema:
            items:
              $ref: '#/definitions/models.Message'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Channel not found
          schema:
            additionalProperties: true
            type: object
      summary: Get channel messages
      tags:
      - Chat
  /api/v1/channels/{channel_id}/users/{user_id}:
    delete:
      consumes:
      - application/json
      description: Remove a user from a chat channel
      parameters:
      - description: Channel ID
        in: path
        name: channel_id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User left channel successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Channel not found
          schema:
            additionalProperties: true
            type: object
      summary: Leave a channel
      tags:
      - Chat
    post:
      consumes:
      - application/json
      description: Add a user to a chat channel
      parameters:
      - description: Channel ID
        in: path
        name: channel_id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User joined channel successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Channel not found
          schema:
            additionalProperties: true
            type: object
      summary: Join a channel
      tags:
      - Chat
  /api/v1/files/delete:
    delete:
      consumes:
      - application/json
      description: Delete a file from a channel
      parameters:
      - description: File ID
        in: query
        name: file_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: File deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Access denied
          schema:
            additionalProperties: true
            type: object
        "404":
          description: File not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Delete a file
      tags:
      - Files
  /api/v1/files/download:
    get:
      consumes:
      - application/json
      description: Download a file from a channel
      parameters:
      - description: File ID
        in: query
        name: file_id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Access denied
          schema:
            additionalProperties: true
            type: object
        "404":
          description: File not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Download a file
      tags:
      - Files
  /api/v1/files/list:
    get:
      consumes:
      - application/json
      description: Get a list of all files in a specific channel
      parameters:
      - description: Channel ID
        in: query
        name: channel_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of files
          schema:
            items:
              $ref: '#/definitions/models.File'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Access denied
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List files in a channel
      tags:
      - Files
  /api/v1/files/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file to a specific channel
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Channel ID
        in: formData
        name: channel_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: File uploaded successfully
          schema:
            $ref: '#/definitions/models.File'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Access denied
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Upload a file
      tags:
      - Files
