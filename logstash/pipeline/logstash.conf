input {
  file {
    path => "/app/logs/*.log"
    type => "application"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  if [type] == "application" {
    json {
      source => "message"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "platform-logs-%{+YYYY.MM.dd}"
  }
} 